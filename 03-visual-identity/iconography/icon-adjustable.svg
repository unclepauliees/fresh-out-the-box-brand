<?xml version="1.0" encoding="UTF-8"?>
<!-- Adjustable Fit: a horizontal bar with outward-pointing arrows on each end -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#1E1510" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Adjustable fit">
  <title>Adjustable Fit</title>
  <!-- Center horizontal bar -->
  <line x1="4" y1="12" x2="20" y2="12"/>
  <!-- Left outward arrow -->
  <path d="M 7 9 L 4 12 L 7 15"/>
  <!-- Right outward arrow -->
  <path d="M 17 9 L 20 12 L 17 15"/>
  <!-- Small vertical tick marks showing adjustment range -->
  <line x1="4" y1="9" x2="4" y2="15"/>
  <line x1="20" y1="9" x2="20" y2="15"/>
</svg>
