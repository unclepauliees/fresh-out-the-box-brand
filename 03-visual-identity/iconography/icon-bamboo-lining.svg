<?xml version="1.0" encoding="UTF-8"?>
<!-- Bamboo Lining: three bamboo stalks with segment nodes -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#1E1510" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Bamboo-cotton lining">
  <title>Bamboo-Cotton Lining</title>
  <!-- Three bamboo stalks -->
  <line x1="7" y1="21" x2="7" y2="3"/>
  <line x1="12" y1="21" x2="12" y2="3"/>
  <line x1="17" y1="21" x2="17" y2="3"/>
  <!-- Segment nodes on each stalk — horizontal dashes at intervals -->
  <line x1="5.5" y1="8" x2="8.5" y2="8" stroke-width="1.5"/>
  <line x1="5.5" y1="15" x2="8.5" y2="15" stroke-width="1.5"/>
  <line x1="10.5" y1="11" x2="13.5" y2="11" stroke-width="1.5"/>
  <line x1="10.5" y1="17" x2="13.5" y2="17" stroke-width="1.5"/>
  <line x1="15.5" y1="7" x2="18.5" y2="7" stroke-width="1.5"/>
  <line x1="15.5" y1="14" x2="18.5" y2="14" stroke-width="1.5"/>
</svg>
