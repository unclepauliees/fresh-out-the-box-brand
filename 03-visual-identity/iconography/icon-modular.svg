<?xml version="1.0" encoding="UTF-8"?>
<!-- Modular: two rounded rectangles with a separation gap — shell above, insert below -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#1E1510" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Modular design">
  <title>Modular</title>
  <!-- Insert (hair halo — sits on top) -->
  <rect x="6" y="3" width="12" height="7" rx="2"/>
  <!-- Small separation gap indicator -->
  <line x1="9" y1="13" x2="15" y2="13" stroke-dasharray="2 2" stroke-width="1"/>
  <!-- Shell (hat body — sits below) -->
  <rect x="4" y="14" width="16" height="7" rx="2"/>
</svg>
