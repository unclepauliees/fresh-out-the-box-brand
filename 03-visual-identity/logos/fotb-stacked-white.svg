<?xml version="1.0" encoding="UTF-8"?>
<!-- Fresh Out The Box — Stacked Lockup (White Reverse) -->
<!-- Remove the background rect in production. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 130" width="220" height="130" role="img" aria-label="Fresh Out The Box">
  <title>Fresh Out The Box — Stacked (White Reverse)</title>
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&amp;family=Manrope:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&amp;display=swap');
      .wm { font-family: 'Syne','Helvetica Neue',Arial,sans-serif; }
      .wm-sub { font-family: 'Manrope', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="220" height="130" fill="#1E1510"/>

  <path
    d="M 99.7 13.8 A 30 30 0 1 0 120.3 13.8"
    fill="none"
    stroke="#F5EDE3"
    stroke-width="2.4"
    stroke-linecap="round"
  />

  <line x1="55" y1="80" x2="165" y2="80" stroke="#F5EDE3" stroke-width="0.5" opacity="0.2"/>

  <text x="110" y="98" class="wm" font-size="16" font-weight="600" fill="#F5EDE3" letter-spacing="3" text-anchor="middle" dominant-baseline="middle">FRESH OUT THE BOX</text>
  <text x="110" y="115" class="wm-sub" font-size="6.5" font-weight="300" fill="#F5EDE3" letter-spacing="1.5" text-anchor="middle" dominant-baseline="middle" opacity="0.55">RESTORING CONFIDENCE, ONE HAT AT A TIME</text>
</svg>
