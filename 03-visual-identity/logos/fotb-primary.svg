<?xml version="1.0" encoding="UTF-8"?>
<!-- Fresh Out The Box — Primary Logotype (Horizontal, Full Color) -->
<!-- Halo mark left + wordmark right. Google Fonts: Syne. -->
<!-- NOTE: Text uses font-family reference. For print/production, outline to paths. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80" role="img" aria-label="Fresh Out The Box">
  <title>Fresh Out The Box</title>
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&amp;family=Manrope:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&amp;display=swap');
      .wordmark-primary { font-family: 'Syne','Helvetica Neue',Arial,sans-serif; }
      .wordmark-sub { font-family: 'Manrope', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Halo mark — arc center at (40, 40), radius 30 -->
  <!-- Start (250°): x=29.7, y=11.8  |  End (290°): x=50.3, y=11.8 — 320° arc, gap at top -->
  <path
    d="M 29.7 11.8 A 30 30 0 1 0 50.3 11.8"
    fill="none"
    stroke="#1E1510"
    stroke-width="2.6"
    stroke-linecap="round"
  />

  <!-- Vertical rule separating mark from wordmark -->
  <line x1="88" y1="18" x2="88" y2="62" stroke="#1E1510" stroke-width="0.5" opacity="0.35"/>

  <!-- Wordmark: FRESH OUT THE BOX -->
  <text
    x="104"
    y="38"
    class="wordmark-primary"
    font-size="19"
    font-weight="600"
    fill="#1E1510"
    letter-spacing="3"
    dominant-baseline="middle"
  >FRESH OUT THE BOX</text>

  <!-- Tagline: Restoring confidence, one hat at a time. -->
  <text
    x="105"
    y="55"
    class="wordmark-sub"
    font-size="7.5"
    font-weight="300"
    fill="#8C7E74"
    letter-spacing="1.5"
    dominant-baseline="middle"
  >RESTORING CONFIDENCE, ONE HAT AT A TIME</text>
</svg>
