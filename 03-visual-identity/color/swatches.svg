<?xml version="1.0" encoding="UTF-8"?>
<!-- Fresh Out The Box — Color Swatches Reference Sheet -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340" role="img" aria-label="Fresh Out The Box color palette swatches">
  <title>Fresh Out The Box — Color Palette</title>
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&amp;display=swap');
      text { font-family: 'Manrope', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="760" height="340" fill="#F5EDE3"/>

  <!-- Title -->
  <text x="32" y="38" font-size="11" font-weight="500" fill="#1E1510" letter-spacing="2">FRESH OUT THE BOX — COLOR PALETTE</text>
  <line x1="32" y1="48" x2="728" y2="48" stroke="#1E1510" stroke-width="0.5" opacity="0.2"/>

  <!-- Row 1: Primary Colors -->
  <text x="32" y="72" font-size="7.5" font-weight="400" fill="#8C7E74" letter-spacing="1.5">PRIMARY</text>

  <!-- Espresso -->
  <rect x="32" y="80" width="120" height="120" fill="#1E1510" rx="3"/>
  <text x="32" y="216" font-size="9" font-weight="500" fill="#1E1510">Espresso</text>
  <text x="32" y="229" font-size="7.5" font-weight="300" fill="#8C7E74">#1E1510</text>
  <text x="32" y="241" font-size="7.5" font-weight="300" fill="#8C7E74">30, 21, 16</text>

  <!-- Crème -->
  <rect x="168" y="80" width="120" height="120" fill="#F5EDE3" rx="3" stroke="#E8DDD0" stroke-width="1"/>
  <text x="168" y="216" font-size="9" font-weight="500" fill="#1E1510">Crème</text>
  <text x="168" y="229" font-size="7.5" font-weight="300" fill="#8C7E74">#F5EDE3</text>
  <text x="168" y="241" font-size="7.5" font-weight="300" fill="#8C7E74">245, 237, 227</text>

  <!-- Row 1: Secondary Colors -->
  <text x="320" y="72" font-size="7.5" font-weight="400" fill="#8C7E74" letter-spacing="1.5">SECONDARY</text>

  <!-- Cognac -->
  <rect x="320" y="80" width="80" height="80" fill="#B8713F" rx="3"/>
  <text x="320" y="175" font-size="8" font-weight="500" fill="#1E1510">Cognac</text>
  <text x="320" y="186" font-size="6.5" font-weight="300" fill="#8C7E74">#B8713F</text>
  <text x="320" y="196" font-size="6.5" font-weight="300" fill="#8C7E74">Large text only</text>

  <!-- Cognac Deep -->
  <rect x="412" y="80" width="80" height="80" fill="#8B5230" rx="3"/>
  <text x="412" y="175" font-size="8" font-weight="500" fill="#1E1510">Cognac Deep</text>
  <text x="412" y="186" font-size="6.5" font-weight="300" fill="#8C7E74">#8B5230</text>
  <text x="412" y="196" font-size="6.5" font-weight="300" fill="#8C7E74">CTA, white text ✓</text>

  <!-- Blush -->
  <rect x="504" y="80" width="80" height="80" fill="#D4A59E" rx="3"/>
  <text x="504" y="175" font-size="8" font-weight="500" fill="#1E1510">Blush</text>
  <text x="504" y="186" font-size="6.5" font-weight="300" fill="#8C7E74">#D4A59E</text>
  <text x="504" y="196" font-size="6.5" font-weight="300" fill="#8C7E74">Espresso text ✓</text>

  <!-- Sage -->
  <rect x="596" y="80" width="80" height="80" fill="#7A8E6E" rx="3"/>
  <text x="596" y="175" font-size="8" font-weight="500" fill="#1E1510">Sage</text>
  <text x="596" y="186" font-size="6.5" font-weight="300" fill="#8C7E74">#7A8E6E</text>
  <text x="596" y="196" font-size="6.5" font-weight="300" fill="#8C7E74">Espresso text ✓</text>

  <!-- Row 2: Neutrals -->
  <line x1="32" y1="256" x2="728" y2="256" stroke="#1E1510" stroke-width="0.5" opacity="0.15"/>
  <text x="32" y="274" font-size="7.5" font-weight="400" fill="#8C7E74" letter-spacing="1.5">FUNCTIONAL NEUTRALS</text>

  <!-- Off-Black -->
  <rect x="32" y="282" width="60" height="40" fill="#2C2420" rx="2"/>
  <text x="100" y="296" font-size="8" font-weight="500" fill="#1E1510">Off-Black #2C2420</text>
  <text x="100" y="308" font-size="6.5" font-weight="300" fill="#8C7E74">Body text, 13.8:1 on Crème</text>

  <!-- Parchment -->
  <rect x="220" y="282" width="60" height="40" fill="#E8DDD0" rx="2" stroke="#C9B49A" stroke-width="0.5"/>
  <text x="288" y="296" font-size="8" font-weight="500" fill="#1E1510">Parchment #E8DDD0</text>
  <text x="288" y="308" font-size="6.5" font-weight="300" fill="#8C7E74">Card backgrounds, subtle contrast</text>

  <!-- Warm Sand -->
  <rect x="408" y="282" width="60" height="40" fill="#C9B49A" rx="2"/>
  <text x="476" y="296" font-size="8" font-weight="500" fill="#1E1510">Warm Sand #C9B49A</text>
  <text x="476" y="308" font-size="6.5" font-weight="300" fill="#8C7E74">Dividers, mid-tone support</text>

  <!-- Warm Stone -->
  <rect x="596" y="282" width="60" height="40" fill="#8C7E74" rx="2"/>
  <text x="664" y="296" font-size="8" font-weight="500" fill="#1E1510">Warm Stone #8C7E74</text>
  <text x="664" y="308" font-size="6.5" font-weight="300" fill="#8C7E74">Large captions only</text>
</svg>
